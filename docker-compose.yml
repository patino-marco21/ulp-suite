name: ulp-suite

networks:
  default:
    name: ulpsuite_network
    driver: bridge

services:
  # ─── ClickHouse (primary credential data store) ───────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: ulpsuite_clickhouse
    restart: always
    # Ports intentionally NOT exposed on host — app connects via internal Docker network.
    # To query ClickHouse directly for debugging: docker exec -it ulpsuite_clickhouse clickhouse-client
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ulp}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d/
      - ./docker/clickhouse/config:/etc/clickhouse-server/config.d/
      - ./docker/clickhouse/users:/etc/clickhouse-server/users.d/
    healthcheck:
      # clickhouse-client is always present in the official image.
      # Passes $CLICKHOUSE_USER/$CLICKHOUSE_PASSWORD from the container env so
      # the check works regardless of whether a password is configured.
      test: ["CMD-SHELL", "clickhouse-client --host localhost --user $CLICKHOUSE_USER --password $CLICKHOUSE_PASSWORD --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ─── App (Next.js — SQLite for metadata, ClickHouse for credentials) ──────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ulpsuite_app
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # ClickHouse — credential data store
      CLICKHOUSE_HOST: "http://clickhouse:8123"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DB:-ulp}
      # SQLite — app metadata (users, API keys, monitors, audit logs)
      SQLITE_PATH: /app/data/ulp.db
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # Default admin (seeded on first startup if no users exist)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ulpsuite.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./inbox:/app/inbox
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse_data:
    driver: local
