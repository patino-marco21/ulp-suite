networks:
  default:
    name: ulpvault_network
    driver: bridge

services:
  # ─── ClickHouse (primary credential data store) ───────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: ulpvault_clickhouse
    restart: always
    # Ports intentionally NOT exposed on host — app connects via internal Docker network.
    # To query ClickHouse directly for debugging: docker exec -it ulpvault_clickhouse clickhouse-client
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ulp}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d/
      - ./docker/clickhouse/config:/etc/clickhouse-server/config.d/
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ─── App (Next.js — SQLite for metadata, ClickHouse for credentials) ──────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ulpvault_app
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # ClickHouse — credential data store
      CLICKHOUSE_HOST: "http://clickhouse:8123"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DB:-ulp}
      # SQLite — app metadata (users, API keys, monitors, audit logs)
      SQLITE_PATH: /app/data/ulp.db
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # Default admin (seeded on first startup if no users exist)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ulp.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse_data:
    driver: local
