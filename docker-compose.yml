name: ulp-suite

networks:
  default:
    name: ulpsuite_network
    driver: bridge

services:
  # ─── ClickHouse (primary credential data store) ───────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: ulpsuite_clickhouse
    restart: unless-stopped
    # Ports intentionally NOT exposed on host — app connects via internal Docker network.
    # To query ClickHouse directly for debugging: docker exec -it ulpsuite_clickhouse clickhouse-client
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ulp}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      # IMPORTANT: Leave CLICKHOUSE_PASSWORD empty (the default).
      # docker/clickhouse/users/default-user.xml hardcodes an empty password for
      # the 'default' user.  If you set a non-empty password here the app will
      # fail every ClickHouse query (server has empty password, app sends yours).
      # The ClickHouse port is NOT exposed to the host, so no password is needed.
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    # Memory: 32 GB total — 20 GB ClickHouse + 8 GB App + 4 GB OS/kernel headroom.
    # CRITICAL: mark_cache (1 GB) + uncompressed_cache (1 GB) are allocated OUTSIDE
    # max_server_memory_usage (16 GB). Total ClickHouse RSS ceiling = 18 GB → 2 GB
    # safety margin inside the 20 GB container. See ulp-performance.xml for details.
    mem_limit: 20g
    mem_reservation: 12g
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d/
      - ./docker/clickhouse/config:/etc/clickhouse-server/config.d/
      - ./docker/clickhouse/users:/etc/clickhouse-server/users.d/
    healthcheck:
      # /ping is answered by a dedicated lightweight HTTP thread that bypasses the
      # query layer entirely — returns "Ok." in milliseconds regardless of whether
      # MATERIALIZE INDEX mutations are saturating background threads.
      # wget is pre-installed in the clickhouse/clickhouse-server image.
      # No auth needed: /ping is unauthenticated by design.
      test: ["CMD-SHELL", "wget -q --tries=1 -O /dev/null http://localhost:8123/ping || exit 1"]
      interval: 10s
      # /ping responds in <1 s when the server is alive; 5 s is generous.
      timeout: 5s
      # 90 retries × 10 s = 900 s (15 min) of checking after start_period expires.
      retries: 90
      # 60 s before the first check: ClickHouse's HTTP server (and therefore /ping)
      # starts responding within 10–30 s even on large datasets. 300 s was tuned for
      # SELECT 1 which needs the query layer fully ready; /ping needs only the HTTP
      # server thread, which starts far earlier.
      start_period: 60s
      # Docker Compose 2.20+: probe every 5 s DURING the start_period window
      # instead of waiting the full 60 s before the first probe.  Without this,
      # Docker runs zero probes for 60 s then starts the 10 s interval — meaning
      # a ClickHouse that's ready in 15 s still blocks the app container for ~70 s.
      # With start_interval: 5 s the app starts within ~20 s on a warm cache.
      start_interval: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── App (Next.js — SQLite for metadata, ClickHouse for credentials) ──────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ulpsuite_app
    # unless-stopped: restarts after laptop reboot (unlike on-failure which only
    # restarts on crash, not after a clean Docker daemon restart).
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Memory: 8 GB container / 6 GB Node.js heap = 2 GB OS headroom.
    # Node.js 24 is container-aware — NODE_OPTIONS makes the limit explicit.
    mem_limit: 8g
    mem_reservation: 4g
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=6144"
      # CRITICAL: Docker sets HOSTNAME to the container short-ID by default, silently
      # overriding the "ENV HOSTNAME=0.0.0.0" baked into the Dockerfile image.
      # Next.js standalone server.js reads process.env.HOSTNAME for its bind address;
      # without this override Next.js binds to the container's internal IP only, which
      # breaks all server-side fetch() calls to http://localhost:3000/api/... and makes
      # every SSR page fail to load. (Next.js issue #58657)
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # ClickHouse — credential data store
      CLICKHOUSE_HOST: "http://clickhouse:8123"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DB:-ulp}
      # SQLite — app metadata (users, API keys, monitors, audit logs)
      SQLITE_PATH: /app/data/ulp.db
      # Auth — MUST be set to a random secret before first run
      JWT_SECRET: ${JWT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # Default admin (seeded on first startup if no users exist)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ulpsuite.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./inbox:/app/inbox
    depends_on:
      clickhouse:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  clickhouse_data:
    driver: local
